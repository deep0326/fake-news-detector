<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake News Detector</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 40px;
            max-width: 720px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        h1 { font-size: 28px; margin-bottom: 8px; color: #fff; }
        p.subtitle { color: #888; margin-bottom: 24px; }
        textarea {
            width: 100%;
            height: 200px;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #0f0f1a;
            color: #eee;
            font-size: 15px;
            resize: vertical;
        }
        button {
            margin-top: 16px;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.88; }
        .result {
            margin-top: 24px;
            padding: 18px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            background: #0f0f1a;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🕵️ Fake News Detector</h1>
        <p class="subtitle">Paste a news article or headline to check if it's real or fake.</p>

        <form action="/predict" method="POST">
            <textarea name="news" placeholder="Paste your news article here..."></textarea>
            <button type="submit">🔍 Analyze</button>
        </form>

        {% if result %}
            <div class="result">{{ result }}</div>
        {% endif %}
    </div>
</body>
</html>
